name: debouncer
version: 1.0.0
description: Button debouncer with parameterized delay and edge detection
parameters:
  CLK_FREQ: { type: int, default: 100000000, description: "Clock frequency in Hz" }
  DEBOUNCE_MS: { type: int, default: 20, description: "Debounce time in milliseconds" }
ports:
  - { name: clk, dir: input, width: 1 }
  - { name: rst_n, dir: input, width: 1 }
  - { name: btn_in, dir: input, width: 1 }
  - { name: btn_out, dir: output, width: 1 }
  - { name: btn_rise, dir: output, width: 1 }
  - { name: btn_fall, dir: output, width: 1 }
dependencies: []
